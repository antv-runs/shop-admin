version: "3.8"

services:

  app:
    image: antvrunss/shop-admin-api:latest
    container_name: shop-admin-api-prod
    restart: unless-stopped
    working_dir: /var/www
    env_file:
      - .env.production
    volumes:
      - ./.env.production:/var/www/.env
      - ./storage:/var/www/storage
      - ./bootstrap/cache:/var/www/bootstrap/cache
    networks:
      - shop-admin-api-network

  nginx:
    image: nginx:alpine
    container_name: shop-admin-nginx-prod
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./public:/var/www/public
      - ./storage:/var/www/storage
    depends_on:
      - app
    networks:
      - shop-admin-api-network

  queue:
    image: antvrunss/shop-admin-api:latest
    container_name: shop-admin-queue-prod
    restart: unless-stopped
    working_dir: /var/www
    env_file:
      - .env.production
    volumes:
      - ./.env.production:/var/www/.env
      - ./storage:/var/www/storage
      - ./bootstrap/cache:/var/www/bootstrap/cache
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    depends_on:
      - app
    networks:
      - shop-admin-api-network

networks:
  shop-admin-api-network:
    driver: bridge
