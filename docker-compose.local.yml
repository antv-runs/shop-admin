version: "3.8"

services:

  app:
    build:
      context: .
      target: local
    container_name: shop-admin-local
    working_dir: /var/www
    volumes:
      - .:/var/www
    ports:
      - "8000:8000"
    env_file:
      - .env.local
    command: php artisan serve --host=0.0.0.0 --port=8000
    extra_hosts:
      - "host.docker.internal:host-gateway"

  queue:
    build:
      context: .
      target: local
    container_name: shop-admin-queue-local
    working_dir: /var/www
    volumes:
      - .:/var/www
    env_file:
      - .env.local
    command: php artisan queue:work --tries=3 --timeout=90
    extra_hosts:
      - "host.docker.internal:host-gateway"
